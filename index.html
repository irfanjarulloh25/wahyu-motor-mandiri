<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasirStock - Sistem Kasir Premium</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Premium Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Halaman Login -->
    <div id="auth-page">
        <div class="glass-card">
            <h1 class="brand-title">WAHYU MOTOR MANDIRI</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Nama Pengguna</label>
                    <input type="text" id="username" name="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Masuk</button>
            </form>
        </div>
    </div>

    <!-- Tata Letak Aplikasi Utama -->
    <div id="main-layout">
        <header id="sidebar" style="border-right: 1px solid var(--glass-border); border-left: none;">
            <div class="brand-title" style="font-size: 1.5rem; margin-bottom: 2rem; width: 100%;">WAHYU MOTOR<br>
    <span class="brand-sub">MANDIRI</span></div>

            <nav style="width: 100%;">
                <ul>
                    <li><a href="#" data-view="dashboard" class="nav-link active"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                    <li><a href="#" data-view="transactions" class="nav-link"><i data-lucide="shopping-cart"></i> Transaksi Baru</a></li>
                    <li><a href="#" data-view="inventory" class="nav-link"><i data-lucide="package"></i> Stok Sparepart <span id="stock-badge" style="background: var(--danger); color: white; padding: 0.1rem 0.4rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 700; margin-left: 0.5rem; display: none;">0</span></a></li>
                    <li><a href="#" data-view="services" class="nav-link"><i data-lucide="wrench"></i> Jasa Service</a></li>
                    <li><a href="#" data-view="banks" class="nav-link"><i data-lucide="landmark"></i> Manajemen Bank</a></li>
                    <li><a href="#" data-view="history" class="nav-link"><i data-lucide="history"></i> Riwayat</a></li>
                    <li><a href="#" data-view="reports" class="nav-link"><i data-lucide="bar-chart-3"></i> Laporan Laba</a></li>
                </ul>
            </nav>

            <div class="user-info">
                <button id="logout-btn" class="btn btn-primary" style="padding: 0.5rem 1rem;"><i data-lucide="log-out"></i> Keluar</button>
            </div>
        </header>

        <main class="content-wrapper">
            <!-- Dynamic Content Container -->
            <div id="view-container">
                <!-- Dashboard (Default) -->
                <div id="view-dashboard" class="page-view">
                    <div class="grid-stats" id="dashboard-stats">
                        <!-- Stats injected here -->
                    </div>
                    <div class="grid-layout" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                        <div class="glass-card" style="max-width: none; padding: 1.5rem;">
                            <h2 style="margin-bottom: 1rem;">Recent Transactions</h2>
                            <div class="table-container">
                                <table id="recent-transactions-table">
                                    <thead>
                                        <tr>
                                            <th>Date</th>
                                            <th>Customer</th>
                                            <th>License Plate</th>
                                            <th>Total</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="glass-card" style="max-width: none; padding: 1.5rem;">
                            <h2 style="margin-bottom: 1rem;">Low Stock</h2>
                            <ul id="low-stock-list" style="list-style: none;">
                                <!-- Items injected here -->
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Other views will be rendered dynamically -->
            </div>
        </main>
    </div>

    <div id="toast"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // Initialize app if logged in - this is handled by auth.js but we ensure icons are there
        });
    </script>
</body>
</html>
